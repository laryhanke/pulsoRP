<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSO RP — Encontro de Músicos · 2026</title>
<style>
  body {
    background: #1E1008;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    font-family: sans-serif;
  }
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  svg { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
  p {
    font-family: 'Arial Narrow', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(196,82,26,0.5);
  }
</style>
</head>
<body>
<div class="loader">
  <svg width="48" height="28" viewBox="0 0 48 28" fill="none">
    <path d="M0 14 Q4 5 8 14 Q12 23 16 14 Q20 4 24 14 Q28 24 32 14 Q36 4 40 14 Q44 23 48 14"
      stroke="#C4521A" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <p>Carregando</p>
</div>
<script>
  function isMobile() {
    // Check by user agent
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    if (/android/i.test(ua)) return true;
    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return true;
    // Check by screen width as fallback
    if (window.innerWidth <= 768) return true;
    // Check by touch support + small screen
    if ('ontouchstart' in window && window.innerWidth <= 1024) return true;
    return false;
  }

  if (isMobile()) {
    window.location.replace('pulso-rp-mobile.html');
  } else {
    window.location.replace('pulso-rp.html');
  }
</script>
</body>
</html>
